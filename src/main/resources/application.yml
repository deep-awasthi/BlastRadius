spring:
  application:
    name: BlastRadius

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:blastradius}
    username: ${DB_USER:blastradius}
    password: ${DB_PASSWORD:blastradius}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 600000   # 10 minutes

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  security:
    filter:
      order: 10

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:blastradius-super-secret-key-that-is-at-least-256-bits-long-for-hmac-sha}
  expiration: 86400000       # 24 hours
  refresh-expiration: 604800000  # 7 days

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,caches
  endpoint:
    health:
      show-details: always

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha

# Application
blastradius:
  scanner:
    max-file-size-bytes: 1048576  # 1MB
    supported-extensions:
      - .java
  git:
    log-limit: 500
