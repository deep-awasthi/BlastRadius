<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlastRadius — Login</title>
    <meta name="description" content="BlastRadius Engineering Dependency Intelligence Platform — Sign in">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="brand-icon">⚡</div>
                <h1 class="brand-name">BlastRadius</h1>
                <p class="brand-tagline">Ask your codebase anything.</p>
            </div>

            <div th:if="${param.logout}" class="alert alert-info">
                You have been signed out.
            </div>
            <div th:if="${param.error}" class="alert alert-error">
                Invalid username or password.
            </div>

            <form action="/login" method="post" class="auth-form" id="login-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username"
                           class="form-input" placeholder="Enter your username"
                           required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password"
                           class="form-input" placeholder="Enter your password"
                           required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary btn-full" id="login-btn">
                    Sign In
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account?
                <a href="/register" class="auth-link">Create one</a>
            </div>
        </div>
        <div class="auth-glow"></div>
    </div>
</body>
</html>
